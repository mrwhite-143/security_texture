<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Pattern PNG Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-5xl bg-zinc-900 rounded-3xl shadow-2xl p-6 md:p-8 border border-zinc-800"><div class="mb-6">
  <h1 class="text-3xl md:text-4xl font-bold mb-2">
    SVG Pattern → Transparent PNG
  </h1>
  <p class="text-zinc-400 text-sm md:text-base">
    Paste your SVG pattern code and generate a transparent PNG instantly.
  </p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <div>
    <label class="block mb-3 text-sm font-medium text-zinc-300">
      SVG Pattern Code
    </label>

    <textarea
      id="patternInput"
      class="w-full h-[420px] bg-zinc-950 border border-zinc-800 rounded-2xl p-4 text-sm font-mono outline-none focus:border-zinc-500 resize-none"
      placeholder='<pattern id="pattern-1" patternUnits="userSpaceOnUse" width="4" height="4">&#10;  <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="white" />&#10;</pattern>'
    ></textarea>

    <div class="flex flex-wrap gap-3 mt-5">
      <button
        onclick="generatePattern()"
        class="px-6 py-3 rounded-2xl bg-white text-black font-semibold hover:scale-105 transition"
      >
        Generate PNG
      </button>

      <button
        onclick="downloadPNG()"
        class="px-6 py-3 rounded-2xl border border-zinc-700 hover:bg-zinc-800 transition"
      >
        Download PNG
      </button>
    </div>
  </div>

  <div>
    <div class="flex items-center justify-between mb-3">
      <label class="text-sm font-medium text-zinc-300">
        Preview
      </label>

      <span class="text-xs text-zinc-500">
        Transparent Background
      </span>
    </div>

    <div class="relative overflow-hidden rounded-3xl border border-zinc-800 bg-[linear-gradient(45deg,#222_25%,transparent_25%,transparent_75%,#222_75%,#222),linear-gradient(45deg,#222_25%,transparent_25%,transparent_75%,#222_75%,#222)] bg-[length:32px_32px] bg-[position:0_0,16px_16px] min-h-[420px] flex items-center justify-center">

      <canvas
        id="canvas"
        width="1024"
        height="1024"
        class="max-w-full max-h-[420px] rounded-2xl"
      ></canvas>
    </div>
  </div>

</div>

  </div>  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function generatePattern() {
      const patternCode = document.getElementById('patternInput').value.trim();

      if (!patternCode) {
        alert('Please paste SVG pattern code');
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg"
             width="1024"
             height="1024"
             viewBox="0 0 1024 1024">

          <defs>
            ${patternCode}
          </defs>

          <rect width="100%" height="100%" fill="url(#pattern-1)" />
        </svg>
      `;

      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const img = new Image();

      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
      };

      img.onerror = () => {
        alert('Invalid SVG Pattern Code');
      };

      img.src = url;
    }

    function downloadPNG() {
      const link = document.createElement('a');
      link.download = 'pattern_output.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script></body>
</html>
